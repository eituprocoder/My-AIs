<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Siri Jr. - Virtual Assistant</title>
    <style>
        body {
            background: radial-gradient(circle at center, #2c3e50, #000);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #siri-container {
            width: 380px;
            height: 600px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .siri-orb {
            width: 100px;
            height: 100px;
            background: linear-gradient(45deg, #00d2ff, #3a7bd5, #cb2d3e, #ef473a);
            filter: blur(15px);
            border-radius: 50%;
            margin-top: 50px;
            animation: rotate 4s infinite linear, pulse 2s infinite ease-in-out;
            opacity: 0.8;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.2); opacity: 0.9; } }
        
        #display {
            margin-top: 40px;
            text-align: center;
            color: white;
            font-size: 1.2rem;
            font-weight: 300;
            height: 100px;
        }
        .reminder-card {
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            margin-top: 10px;
            border-left: 3px solid #00d2ff;
        }
        input {
            width: 80%;
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 15px;
            border-radius: 20px;
            color: white;
            text-align: center;
            outline: none;
            position: absolute;
            bottom: 40px;
        }
    </style>
</head>
<body>

<div id="siri-container">
    <div class="siri-orb"></div>
    <div id="display">¿En qué puedo ayudarte?</div>
    <div id="reminders"></div>
    <input type="text" id="siriIn" placeholder="Escribe aquí..." onkeypress="if(event.key==='Enter') askSiri()">
</div>

<script>
    let siriDB = JSON.parse(localStorage.getItem('siriDB')) || {};
    let reminders = JSON.parse(localStorage.getItem('siriReminders')) || [];

    function askSiri() {
        const input = document.getElementById('siriIn');
        const display = document.getElementById('display');
        const remDiv = document.getElementById('reminders');
        const val = input.value.trim();
        
        if(!val) return;

        // MODO RECORDAR
        if(val.toLowerCase().startsWith('recordar ')) {
            const task = val.replace('recordar ', '');
            const now = new Date().toLocaleTimeString();
            reminders.push({task, time: now});
            localStorage.setItem('siriReminders', JSON.stringify(reminders));
            display.innerText = "Hecho. Lo he anotado.";
            renderReminders();
        } 
        // MODO APRENDER
        else if(val.includes('=')) {
            const [k, v] = val.split('=');
            siriDB[k.trim().toLowerCase()] = v.trim();
            localStorage.setItem('siriDB', JSON.stringify(siriDB));
            display.innerText = `Entendido. He aprendido qué es ${k.trim()}.`;
        }
        // MODO CONSULTA
        else {
            const res = siriDB[val.toLowerCase()];
            display.innerText = res ? res : "No estoy segura de haber entendido. ¿Me lo enseñas con '='?";
        }
        
        input.value = "";
    }

    function renderReminders() {
        const remDiv = document.getElementById('reminders');
        remDiv.innerHTML = "";
        reminders.slice(-2).forEach(r => {
            remDiv.innerHTML += `<div class="reminder-card">🔔 ${r.task} (${r.time})</div>`;
        });
    }

    renderReminders();
</script>

</body>
</html>
