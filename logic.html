<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logic AI</title>
    <style>
        :root {
            --bg-color: #050510;
            --glow-primary: #00ffff;
            --glow-secondary: #bf00ff;
            --text-color: #e0e0e0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #app-container {
            width: 90%;
            max-width: 600px;
            height: 85vh;
            display: flex;
            flex-direction: column;
            border: 2px solid var(--glow-primary);
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3), inset 0 0 10px rgba(0, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.8);
        }

        #header {
            text-align: center;
            padding: 15px;
            font-size: 24px;
            font-weight: bold;
            color: var(--glow-primary);
            text-shadow: 0 0 10px var(--glow-primary);
            border-bottom: 1px solid var(--glow-primary);
        }

        #chat-box {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 10px;
            word-wrap: break-word;
        }

        .user-msg {
            align-self: flex-end;
            background: rgba(191, 0, 255, 0.1);
            border: 1px solid var(--glow-secondary);
            box-shadow: 0 0 10px rgba(191, 0, 255, 0.3);
            color: #fff;
        }

        .logic-msg {
            align-self: flex-start;
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid var(--glow-primary);
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
            color: #fff;
        }

        #input-area {
            display: flex;
            padding: 15px;
            border-top: 1px solid var(--glow-primary);
            gap: 10px;
        }

        #user-input {
            flex-grow: 1;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            color: #fff;
            padding: 10px;
            font-family: inherit;
            outline: none;
            transition: 0.3s;
        }

        #user-input:focus {
            border-color: var(--glow-primary);
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }

        #send-btn {
            background: transparent;
            border: 1px solid var(--glow-primary);
            color: var(--glow-primary);
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            transition: 0.3s;
        }

        #send-btn:hover {
            background: var(--glow-primary);
            color: #000;
            box-shadow: 0 0 15px var(--glow-primary);
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--glow-primary); border-radius: 4px; }
    </style>
</head>
<body>

    <div id="app-container">
        <div id="header">L O G I C</div>
        <div id="chat-box" id="chat">
            <div class="message logic-msg">Hola. Soy Logic. Estoy listo para aprender.</div>
        </div>
        <div id="input-area">
            <input type="text" id="user-input" placeholder="Comando o pregunta..." autocomplete="off">
            <button id="send-btn">Enviar</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        // Cargar memoria desde localStorage para que Logic recuerde offline
        let memory = JSON.parse(localStorage.getItem('logic_memory')) || {};

        function saveMemory() {
            localStorage.setItem('logic_memory', JSON.stringify(memory));
        }

        function addMessage(sender, text) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            msgDiv.classList.add(sender === 'user' ? 'user-msg' : 'logic-msg');
            msgDiv.textContent = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function fetchWikipedia(term) {
            try {
                // API pública de Wikipedia, no requiere API Key
                const response = await fetch(`https://es.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(term)}`);
                if (response.ok) {
                    const data = await response.json();
                    return data.extract || "Encontré la página, pero no hay un resumen disponible.";
                } else {
                    return `No pude encontrar información sobre "${term}" en Wikipedia.`;
                }
            } catch (error) {
                return "Error de conexión. Asegúrate de tener internet para buscar en Wikipedia.";
            }
        }

        async function processLogic(input) {
            let lowerInput = input.trim().toLowerCase();

            // 1. Entrenamiento: pregunta = respuesta
            if (input.includes('=')) {
                let parts = input.split('=');
                if (parts.length === 2) {
                    let key = parts[0].trim().toLowerCase();
                    let value = parts[1].trim();
                    memory[key] = value;
                    saveMemory();
                    return `[Base de datos actualizada] Cuando digas "${key}", responderé "${value}".`;
                }
            }

            // 2. Entrenamiento: Palabra es (nombre/concepto)
            let esMatch = lowerInput.match(/(.+)\s+es\s+(.+)/);
            if (esMatch && !lowerInput.startsWith('busca') && !lowerInput.startsWith('elige')) {
                let key = esMatch[1].trim();
                let value = esMatch[2].trim();
                memory[key] = value;
                saveMemory();
                return `[Aprendido] Recordaré que ${key} es ${value}.`;
            }

            // 3. Buscar en Wikipedia: Busca (cosa) en wikipedia
            if (lowerInput.startsWith('busca') && lowerInput.includes('en wikipedia')) {
                let term = lowerInput.replace('busca', '').replace('en wikipedia', '').trim();
                addMessage('logic', `Buscando "${term}" en la red...`);
                let result = await fetchWikipedia(term);
                return result;
            }

            // 4. Elegir entre opciones: Elige entre (opcion1) y (opcion2)
            if (lowerInput.startsWith('elige entre')) {
                // Soporta "elige entre x y y" o "elige entre x o y"
                let optionsStr = lowerInput.replace('elige entre', '').trim();
                let options = optionsStr.split(/\s+y\s+|\s+o\s+/); 
                if (options.length >= 2) {
                    let choice = options[Math.floor(Math.random() * options.length)].trim();
                    return `Analizando variables... Mi elección es: ${choice.toUpperCase()}`;
                } else {
                    return "Formato incorrecto. Usa: Elige entre [A] y [B]";
                }
            }

            // Respuesta por defecto (Buscar en memoria)
            if (memory[lowerInput]) {
                return memory[lowerInput];
            } else {
                return "Datos insuficientes. Enséñame usando 'pregunta = respuesta' o 'palabra es concepto'.";
            }
        }

        async function handleSend() {
            const text = userInput.value;
            if (!text.trim()) return;

            addMessage('user', text);
            userInput.value = '';

            const logicResponse = await processLogic(text);
            if (logicResponse) {
                addMessage('logic', logicResponse);
            }
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });
    </script>
</body>
</html>
