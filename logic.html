<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logic AI</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --chat-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #3b82f6;
            --user-msg: #2563eb;
            --logic-msg: #475569;
            --peer-msg: #059669;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background-color: var(--chat-bg);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .header {
            padding: 15px 20px;
            background-color: #0b1121;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .peer-controls {
            display: flex;
            gap: 10px;
            font-size: 14px;
        }

        input[type="text"] {
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #334155;
            background-color: var(--bg-color);
            color: white;
            outline: none;
        }

        button {
            padding: 8px 15px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        button:hover { background-color: #2563eb; }

        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.4;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user { align-self: flex-end; background-color: var(--user-msg); border-bottom-right-radius: 2px; }
        .logic { align-self: flex-start; background-color: var(--logic-msg); border-bottom-left-radius: 2px; }
        .peer { align-self: flex-start; background-color: var(--peer-msg); border-bottom-left-radius: 2px; }

        .input-area {
            padding: 15px 20px;
            background-color: #0b1121;
            display: flex;
            gap: 10px;
        }

        .input-area input { flex: 1; padding: 12px; font-size: 16px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>Logic AI</h2>
        <div class="peer-controls">
            <span id="my-id">Iniciando ID...</span>
            <input type="text" id="peer-id-input" placeholder="ID del amigo">
            <button onclick="connectToPeer()">Conectar</button>
        </div>
    </div>

    <div class="chat-box" id="chat-box">
        <div class="message logic">¡Hola! Soy Logic 🤖. Estoy listo para charlar. Puedes enseñarme cosas diciendo: "Cuando diga [palabra] responde [respuesta]".</div>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Escribe tu mensaje o pregunta algo..." onkeypress="handleEnter(event)">
        <button onclick="sendMessage()">Enviar</button>
    </div>
</div>

<script>
    /* =========================================
       1. VARIABLES GLOBALES, MEMORIA Y PEERJS
       ========================================= */
    let peer;
    let peerConnection;
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    
    // Cargar la memoria aprendida del navegador (localStorage)
    let learnedKnowledge = JSON.parse(localStorage.getItem('logicLearnedData')) || {};

    // Inicializar PeerJS
    peer = new Peer(); 
    peer.on('open', function(id) { document.getElementById('my-id').innerText = "Tu ID: " + id; });

    // Escuchar conexiones entrantes
    peer.on('connection', function(conn) {
        peerConnection = conn;
        setupConnection();
        addMessage('¡Un usuario se ha conectado a la sala!', 'logic');
    });

    function connectToPeer() {
        const destId = document.getElementById('peer-id-input').value;
        if(destId) {
            peerConnection = peer.connect(destId);
            setupConnection();
        }
    }

    function setupConnection() {
        peerConnection.on('data', function(data) {
            if(data.type === 'chat') {
                addMessage(data.text, 'peer');
            } else if (data.type === 'logic') {
                addMessage(data.text, 'logic');
            }
        });
        peerConnection.on('open', () => {
            addMessage('¡Conectado exitosamente con tu amigo!', 'logic');
        });
    }

    /* =========================================
       2. INTERFAZ DE USUARIO
       ========================================= */
    function handleEnter(e) { if (e.key === 'Enter') sendMessage(); }

    function addMessage(text, sender) {
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('message', sender);
        msgDiv.innerText = text;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
        
        if (sender === 'logic') speakText(text);
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        addMessage(text, 'user');
        userInput.value = '';

        if (peerConnection && peerConnection.open) peerConnection.send({ type: 'chat', text: text });

        const logicResponse = await processLogicResponse(text);
        
        setTimeout(() => {
            addMessage(logicResponse, 'logic');
            if (peerConnection && peerConnection.open) peerConnection.send({ type: 'logic', text: logicResponse });
        }, 500 + Math.random() * 800); 
    }

    /* =========================================
       3. CEREBRO DE LOGIC (Aprendizaje, NLP, Wiki, Clima y Respuestas Múltiples)
       ========================================= */
    async function processLogicResponse(text) {
        const lowerText = text.toLowerCase();
        let responses = []; // Array para acumular múltiples respuestas

        // 3.1 SISTEMA DE APRENDIZAJE EN VIVO
        const learnMatch = lowerText.match(/cuando diga (.+) responde (.+)/i);
        let learningKeyword = "";
        if (learnMatch) {
            learningKeyword = learnMatch[1].trim();
            const responseStartIndex = text.toLowerCase().indexOf('responde') + 9;
            const response = text.substring(responseStartIndex).trim();
            
            learnedKnowledge[learningKeyword] = response;
            localStorage.setItem('logicLearnedData', JSON.stringify(learnedKnowledge));
            
            responses.push(`¡Anotado! He aprendido una nueva respuesta para "${learningKeyword}". 🧠`);
        }

        // 3.2 REVISAR CONOCIMIENTO APRENDIDO POR EL USUARIO
        for (const [keyword, response] of Object.entries(learnedKnowledge)) {
            // Evitamos responder lo mismo que acabamos de aprender en este mismo turno
            if (lowerText.includes(keyword) && keyword !== learningKeyword) {
                responses.push(response);
            }
        }

        // 3.3 DICCIONARIO DE CONOCIMIENTO BASE
        const knowledgeBase = {
            "html": "Para estructuras web, siempre recomiendo usar etiquetas semánticas limpias.",
            "javascript": "JS es la magia detrás de todo esto. Con JavaScript y algo de lógica matemática, puedes programar desde esta IA hasta juegos multijugador.",
            "css": "El diseño es clave. Las variables CSS ayudan mucho a mantener los colores organizados.",
            "juego": "Crear juegos para el navegador es un gran desafío. Manejar los controles y la física requiere buena lógica.",
            "pac-man": "¡Un clásico arcade! La verdadera complejidad ahí está en programar las rutas de los fantasmas en el laberinto 3D o 2D.",
            "tetris": "Para un Tetris, el mayor reto suele ser manejar la matriz del tablero y la rotación de las piezas para que encajen.",
            "clash": "La estrategia para defender la base y medir los tiempos de ataque es vital en ese tipo de juegos.",
            "minecraft": "El límite es tu imaginación. Usar Redstone es prácticamente programar visualmente dentro del juego.",
            "youtube": "Siempre es buena idea compartir tus proyectos de código o tus gameplays para crear comunidad y crecer."
        };

        for (const [keyword, response] of Object.entries(knowledgeBase)) {
            if (lowerText.includes(keyword)) {
                responses.push(response);
            }
        }

        // 3.4 CHARLA BÁSICA (Saludos y estado)
        const greetings = ['hola', 'buenos días', 'buenas tardes', 'hey'];
        if (greetings.some(g => lowerText.includes(g))) {
            const replies = ["¡Hola! ¿Cómo va el código hoy? 👾", "¡Saludos! ¿En qué puedo ayudarte?", "Hola, aquí Logic escuchando."];
            responses.push(replies[Math.floor(Math.random() * replies.length)]);
        }

        // 3.5 CLIMA Y HORA POR CIUDAD (Nueva función)
        const weatherTimeMatch = lowerText.match(/(?:clima|tiempo|hora) en ([a-zA-ZáéíóúÁÉÍÓÚñÑ\s]+)/i);
        if (weatherTimeMatch) {
            const city = weatherTimeMatch[1].trim();
            const weatherTimeInfo = await fetchWeatherAndTime(city);
            if (weatherTimeInfo) responses.push(weatherTimeInfo);
        }

        // 3.6 BÚSQUEDA EN WIKIPEDIA
        if (lowerText.includes('qué es') || lowerText.includes('quién es') || lowerText.includes('busca') || lowerText.includes('dime sobre')) {
            const query = lowerText.replace(/qué es|quién es|busca|dime sobre/gi, '').trim();
            // Si la búsqueda es válida y no se cruza con pedir el clima/hora
            if (query.length > 0 && !weatherTimeMatch) { 
                const wikiRes = await fetchFromWikipedia(query);
                if (wikiRes) responses.push(wikiRes);
            }
        }

        // 3.7 ARMAR LA RESPUESTA FINAL (Acomodando varias si las hay)
        if (responses.length === 0) {
            const fallbacks = [
                "Interesante... dime más sobre eso. 🤔",
                "No estoy seguro de entender al 100%, pero suena a un buen desafío de código.",
                "Si quieres que busque algo específico, usa la palabra 'busca'."
            ];
            return fallbacks[Math.floor(Math.random() * fallbacks.length)];
        }

        // Si solo hay una respuesta, la mandamos normal
        if (responses.length === 1) {
            return responses[0];
        }

        // Si hay varias, las formateamos 1. (A) 2. (B) ...
        let finalResponse = "";
        for (let i = 0; i < responses.length; i++) {
            finalResponse += `${i + 1}. ${responses[i]} `;
        }
        
        return finalResponse.trim();
    }

    async function fetchFromWikipedia(query) {
        try {
            const searchUrl = `https://es.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&utf8=&format=json&origin=*`;
            const searchRes = await fetch(searchUrl);
            const searchData = await searchRes.json();

            if (searchData.query.search.length === 0) return `Lo siento, no encontré nada sobre "${query}". 😔`;

            const title = searchData.query.search[0].title;
            const extractUrl = `https://es.wikipedia.org/w/api.php?action=query&prop=extracts&exsentences=3&exlimit=1&titles=${encodeURIComponent(title)}&explaintext=1&format=json&origin=*`;
            const extractRes = await fetch(extractUrl);
            const extractData = await extractRes.json();

            const pages = extractData.query.pages;
            const pageId = Object.keys(pages)[0];
            const extract = pages[pageId].extract;

            return `Esto es lo que encontré sobre ${title}: ${extract} 📚`;
        } catch (error) {
            console.error(error);
            return "Hubo un error al intentar consultar Wikipedia. 🔌";
        }
    }

    // NUEVA FUNCIÓN: Obtener clima y hora desde Open-Meteo API
    async function fetchWeatherAndTime(city) {
        try {
            // 1. Obtener coordenadas y zona horaria de la ciudad
            const geoUrl = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=es`;
            const geoRes = await fetch(geoUrl);
            const geoData = await geoRes.json();

            if (!geoData.results || geoData.results.length === 0) {
                return `No pude encontrar la ciudad "${city}" para revisar el clima o la hora. 🌍`;
            }

            const location = geoData.results[0];
            const lat = location.latitude;
            const lon = location.longitude;
            const timezone = location.timezone || 'UTC';
            const country = location.country;
            const cityName = location.name;

            // 2. Obtener clima actual y la hora local basados en las coordenadas
            const weatherUrl = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&timezone=${timezone}`;
            const weatherRes = await fetch(weatherUrl);
            const weatherData = await weatherRes.json();

            const temp = weatherData.current_weather.temperature;
            const timeRaw = weatherData.current_weather.time; // Formato: "YYYY-MM-DDTHH:MM"
            
            // Extraer solo la hora y los minutos
            const timeParts = timeRaw.split('T')[1].split(':');
            const hour = timeParts[0];
            const minute = timeParts[1];

            return `En ${cityName} (${country}), son las ${hour}:${minute} y hacen ${temp}°C de temperatura. 🌤️🕒`;

        } catch (error) {
            console.error(error);
            return `Hubo un error al intentar consultar los datos de "${city}". 🔌`;
        }
    }

    /* =========================================
       4. TTS (VOZ) Y FILTRO DE EMOJIS
       ========================================= */
    function speakText(text) {
        if (!('speechSynthesis' in window)) return; 
        
        // Elimina emojis dejando solo letras, números y signos de puntuación básicos
        const textWithoutEmojis = text.replace(/[^\p{L}\p{N}\p{P}\p{Z}]/gu, '');

        const utterance = new SpeechSynthesisUtterance(textWithoutEmojis);
        utterance.lang = 'es-ES';
        utterance.pitch = 1;      
        utterance.rate = 1.05;    

        const voices = speechSynthesis.getVoices();
        const spanishVoice = voices.find(v => v.lang.includes('es') && (v.name.includes('Google') || v.name.includes('Natural')));
        if (spanishVoice) utterance.voice = spanishVoice;

        window.speechSynthesis.speak(utterance);
    }

    window.speechSynthesis.onvoiceschanged = function() { speechSynthesis.getVoices(); };

</script>
</body>
</html>
