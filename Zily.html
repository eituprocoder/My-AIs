<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zily AI - Memoria Completa</title>
    <style>
        :root { --main-color: #8a2be2; } /* Color por defecto: Violeta para Zily */
        body { font-family: 'Segoe UI', sans-serif; background-color: #0f0f0f; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        #chat-container { width: 450px; height: 600px; background: #181818; border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.7); border: 1px solid #333; }
        
        #config-bar { background: #222; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .logo { font-weight: bold; font-size: 1.2em; color: var(--main-color); letter-spacing: 1px; }

        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; background-image: radial-gradient(#222 1px, transparent 1px); background-size: 20px 20px; }
        .msg { padding: 12px 16px; border-radius: 15px; max-width: 80%; font-size: 14px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .user { align-self: flex-end; background: var(--main-color); color: white; border-bottom-right-radius: 2px; }
        .bot { align-self: flex-start; background: #2d2d2d; color: #eee; border-bottom-left-radius: 2px; }
        
        .teach-hint { font-size: 10px; color: #666; text-align: center; padding: 5px; background: #111; }
        
        #input-area { display: flex; padding: 15px; background: #222; gap: 10px; }
        input { flex: 1; border: none; padding: 12px; border-radius: 10px; background: #333; color: white; outline: none; transition: 0.3s; }
        input:focus { box-shadow: 0 0 5px var(--main-color); }
        button { background: var(--main-color); border: none; color: white; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:active { transform: scale(0.95); }

        input[type="color"] { width: 30px; height: 30px; border: none; background: none; cursor: pointer; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="config-bar">
        <span class="logo">ZILY AI</span>
        <div>
            <input type="color" id="colorPicker" onchange="changeColor(this.value)">
            <button onclick="clearAll()" style="background: #444; font-size: 10px; margin-left: 10px;">Borrar Todo</button>
        </div>
    </div>
    
    <div id="messages"></div>
    
    <div class="teach-hint">
        Comando: <b>aprende: pregunta = respuesta</b>
    </div>
    
    <div id="input-area">
        <input type="text" id="userInput" placeholder="Habla con Zily..." autocomplete="off">
        <button onclick="sendMessage()">Enviar</button>
    </div>
</div>

<script>
    const messagesDiv = document.getElementById('messages');
    const userInput = document.getElementById('userInput');
    
    // --- PERSISTENCIA CON LOCALSTORAGE ---
    
    // 1. Cargar Cerebro (Conocimiento)
    let brain = JSON.parse(localStorage.getItem('zily_brain')) || {
        "hola": "¡Hola! Soy Zily. ¿Qué vamos a crear hoy?",
        "quien eres": "Soy Zily, tu asistente personal sin APIs.",
        "nombre": "Mi nombre es Zily, un placer."
    };

    // 2. Cargar Historial de Mensajes
    let chatHistory = JSON.parse(localStorage.getItem('zily_history')) || [];

    // 3. Cargar Color Personalizado
    let savedColor = localStorage.getItem('zily_color') || '#8a2be2';
    changeColor(savedColor);
    document.getElementById('colorPicker').value = savedColor;

    // --- FUNCIONES PRINCIPALES ---

    function changeColor(color) {
        document.documentElement.style.setProperty('--main-color', color);
        localStorage.setItem('zily_color', color);
    }

    function sendMessage() {
        const input = userInput.value.trim();
        if (!input) return;

        addMessage(input, 'user');
        saveHistory(input, 'user');

        if (input.toLowerCase().startsWith("aprende:")) {
            teachZily(input);
        } else {
            respond(input.toLowerCase());
        }

        userInput.value = "";
    }

    function teachZily(input) {
        try {
            const parts = input.split(":")[1].split("=");
            const key = parts[0].trim().toLowerCase();
            const value = parts[1].trim();
            
            brain[key] = value;
            localStorage.setItem('zily_brain', JSON.stringify(brain));
            
            const res = `¡Entendido! Guardado en mi memoria: "${key}" ahora significa "${value}".`;
            setTimeout(() => {
                addMessage(res, 'bot');
                saveHistory(res, 'bot');
                speak(res);
            }, 500);
        } catch (e) {
            addMessage("Error al aprender. Usa: aprende: pregunta = respuesta", 'bot');
        }
    }

    function respond(text) {
        setTimeout(() => {
            let response = "No tengo una respuesta para eso en mi memoria local. ¿Me enseñas cómo responder?";
            
            for (let key in brain) {
                if (text.includes(key)) {
                    response = brain[key];
                    break;
                }
            }

            addMessage(response, 'bot');
            saveHistory(response, 'bot');
            speak(response);
        }, 600);
    }

    function addMessage(text, sender) {
        const div = document.createElement('div');
        div.classList.add('msg', sender);
        div.innerText = text;
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function saveHistory(text, sender) {
        chatHistory.push({ text, sender });
        localStorage.setItem('zily_history', JSON.stringify(chatHistory));
    }

    function speak(text) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'es-ES';
        utterance.pitch = 1.2; // Voz un poco más aguda para Zily
        window.speechSynthesis.speak(utterance);
    }

    function clearAll() {
        if(confirm("¿Quieres borrar la memoria y el historial de Zily?")) {
            localStorage.clear();
            location.reload();
        }
    }

    // Al cargar la página, restaurar el chat
    window.onload = () => {
        if(chatHistory.length > 0) {
            chatHistory.forEach(msg => addMessage(msg.text, msg.sender));
        } else {
            addMessage("¡Hola! Soy Zily. Estoy lista para que me personalices.", 'bot');
        }
    };

    userInput.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });
</script>

</body>
</html>
